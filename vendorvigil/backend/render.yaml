services:
  - type: web
    name: vendorvigil-backend
    runtime: node
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
